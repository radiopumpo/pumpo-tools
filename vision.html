<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pumpo Vision | AI Screenshot Decoder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="https://radiopumpo.github.io/radiopumpologo.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Fira+Code&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0d0d0d; color: white; }
        .pumpo-neon { color: #ff0080; text-shadow: 0 0 10px rgba(255, 0, 128, 0.4); }
        .back-link { color: #888; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .back-link:hover { color: #40e0d0; }

        /* Scanning Animation */
        .scanner-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: #ff0080; box-shadow: 0 0 15px #ff0080;
            z-index: 30; display: none;
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .drop-zone {
            border: 2px dashed #333; transition: 0.3s;
            background: rgba(255, 255, 255, 0.02);
        }
        .drop-zone.active { border-color: #ff0080; background: rgba(255, 0, 128, 0.05); }
        
        #image-preview { max-height: 400px; display: none; margin: auto; }
        .result-card { border-left: 4px solid #ff0080; background: rgba(255, 0, 128, 0.03); }
    </style>
</head>
<body class="p-8">

    <div class="max-w-3xl mx-auto">
        <header class="mb-12">
            <a href="index.html" class="back-link">← Back to Tools Hub</a>
            <h1 class="text-4xl font-black pumpo-neon mt-4">PUMPO VISION</h1>
            <p class="text-slate-500 text-sm">Upload a screenshot. Get clarity. Take action.</p>
        </header>

        <div class="mb-8 p-6 bg-[#1a1a1a] rounded-xl border border-[#333]">
            <label class="block text-[10px] font-bold text-[#40e0d0] uppercase mb-2">Gemini API Key</label>
            <input type="password" id="apiKey" class="w-full bg-black border border-[#333] rounded-lg p-3 text-sm focus:border-[#40e0d0] outline-none" placeholder="Paste your key here...">
        </div>

        <div class="drop-zone relative rounded-2xl p-12 text-center cursor-pointer mb-8" id="dropZone">
            <div class="scanner-line" id="scanner"></div>
            <div id="upload-prompt">
                <span class="text-4xl">🖼️</span>
                <p class="mt-4 font-bold text-slate-300">Drop screenshot here or click to upload</p>
                <p class="text-xs text-slate-500 mt-2">Works with PNG, JPG, and WebP</p>
            </div>
            <img id="image-preview" src="" alt="Preview" class="rounded-lg shadow-2xl relative z-10">
            <input type="file" id="fileInput" class="hidden" accept="image/*">
        </div>

        <button id="analyzeBtn" class="w-full bg-[#ff0080] text-white font-black py-4 rounded-xl hover:shadow-[0_0_20px_rgba(255,0,128,0.5)] transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
            START ANALYSIS
        </button>

        <div id="results" class="mt-12 hidden">
            <div class="result-card p-6 rounded-r-xl mb-6">
                <h3 class="text-[#40e0d0] font-bold text-xs uppercase mb-3">The Breakdown</h3>
                <div id="aiExplanation" class="text-slate-200 leading-relaxed"></div>
            </div>
            
            <div class="result-card p-6 rounded-r-xl border-l-[#40e0d0] bg-cyan-900/5">
                <h3 class="text-[#ff0080] font-bold text-xs uppercase mb-3">Suggested Next Steps</h3>
                <div id="aiSteps" class="text-slate-200 leading-relaxed"></div>
            </div>
        </div>

        <div id="loadingText" class="text-center mt-6 text-[#ff0080] font-bold animate-pulse hidden">
            SCANNING PIXELS...
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const preview = document.getElementById('image-preview');
        const uploadPrompt = document.getElementById('upload-prompt');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const scanner = document.getElementById('scanner');
        let base64Image = "";

        // --- FILE HANDLING ---
        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                base64Image = e.target.result.split(',')[1];
                preview.src = e.target.result;
                preview.style.display = 'block';
                uploadPrompt.style.display = 'none';
                analyzeBtn.disabled = false;
            };
            reader.readAsDataURL(file);
        }

        // --- AI ANALYSIS ---
        analyzeBtn.onclick = async () => {
            const key = document.getElementById('apiKey').value;
            if (!key) return alert("Please enter your Gemini API Key");

            analyzeBtn.disabled = true;
            scanner.style.display = 'block';
            document.getElementById('loadingText').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');

            const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;

            const payload = {
                contents: [{
                    parts: [
                        { text: "Analyze this screenshot. First, explain what it is in plain English. Second, provide a list of exactly what the user should do next to solve the problem or optimize the situation. Keep it concise." },
                        { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                    ]
                }]
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                const output = data.candidates[0].content.parts[0].text;

                // Simple split logic for demo
                const sections = output.split(/\n\n/);
                document.getElementById('aiExplanation').innerText = sections[0];
                document.getElementById('aiSteps').innerText = sections.slice(1).join('\n\n');

                document.getElementById('results').classList.remove('hidden');
            } catch (err) {
                alert("Analysis failed: " + err.message);
            } finally {
                analyzeBtn.disabled = false;
                scanner.style.display = 'none';
                document.getElementById('loadingText').classList.add('hidden');
            }
        };
    </script>
</body>
</html>
