<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pumpo Prestige | High-Status AI Rewriter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="https://radiopumpo.github.io/radiopumpologo.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Fira+Code&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0d0d0d; color: white; }
        .pumpo-cyan { color: #40e0d0; text-shadow: 0 0 10px rgba(64, 224, 208, 0.4); }
        .back-link { color: #888; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .back-link:hover { color: #ff0080; }

        .status-bar-bg { background: #1a1a1a; height: 8px; border-radius: 4px; overflow: hidden; }
        #status-bar-fill { background: #40e0d0; width: 0%; height: 100%; transition: 1s ease-in-out; }
        
        .mode-btn { 
            border: 1px solid #333; transition: 0.3s; 
            background: #151515; font-size: 0.75rem; font-weight: bold;
        }
        .mode-btn.active { border-color: #40e0d0; color: #40e0d0; background: rgba(64, 224, 208, 0.05); }
        
        textarea { background: #000; border: 1px solid #222; color: #fff; resize: none; transition: 0.3s; }
        textarea:focus { border-color: #40e0d0; outline: none; }
        
        .prestige-output { 
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="p-8">

    <div class="max-w-3xl mx-auto">
        <header class="mb-10 text-center">
            <div class="text-left mb-6">
                <a href="index.html" class="back-link">← Back to Tools Hub</a>
            </div>
            <h1 class="text-4xl font-black pumpo-cyan tracking-tighter">PUMPO PRESTIGE</h1>
            <p class="text-slate-500 text-sm mt-2 uppercase tracking-widest">Elevate your communication status</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="p-4 bg-[#1a1a1a] rounded-xl border border-[#333]">
                <label class="block text-[9px] font-bold text-[#40e0d0] uppercase mb-2">Gemini Key</label>
                <input type="password" id="apiKey" class="w-full bg-black border border-[#333] rounded-lg p-2 text-xs focus:border-[#40e0d0] outline-none" placeholder="Paste key...">
            </div>
            <div class="p-4 bg-[#1a1a1a] rounded-xl border border-[#333]">
                <label class="block text-[9px] font-bold text-[#ff0080] uppercase mb-2">Target Persona</label>
                <div class="flex gap-2">
                    <button onclick="setMode('Executive', this)" class="mode-btn active px-3 py-1 rounded">EXECUTIVE</button>
                    <button onclick="setMode('VC-Ready', this)" class="mode-btn px-3 py-1 rounded">VC-READY</button>
                    <button onclick="setMode('Persuasive', this)" class="mode-btn px-3 py-1 rounded">PERSUASIVE</button>
                </div>
            </div>
        </div>

        <div class="mb-8">
            <textarea id="inputText" rows="6" class="w-full p-4 rounded-xl mb-4" placeholder="Paste your draft text here (email, post, idea)..."></textarea>
            
            <div class="mb-2 flex justify-between items-end">
                <span class="text-[10px] font-bold text-slate-500 uppercase">Status Level</span>
                <span id="level-text" class="text-[10px] font-bold text-[#40e0d0] uppercase">Standard</span>
            </div>
            <div class="status-bar-bg mb-6">
                <div id="status-bar-fill"></div>
            </div>

            <button id="elevateBtn" class="w-full bg-[#40e0d0] text-black font-black py-4 rounded-xl hover:shadow-[0_0_20px_rgba(64,224,208,0.5)] transition-all flex items-center justify-center gap-2">
                <span>ELEVATE TO PRESTIGE</span>
            </button>
        </div>

        <div id="outputSection" class="hidden">
            <div class="prestige-output p-8 rounded-2xl relative">
                <div class="absolute -top-3 left-6 bg-[#40e0d0] text-black text-[10px] font-black px-3 py-1 rounded shadow-lg">
                    PRESTIGE VERSION
                </div>
                <div id="outputText" class="text-lg leading-relaxed text-slate-100 italic"></div>
                
                <div class="mt-8 flex justify-between items-center border-t border-[#333] pt-6">
                    <button onclick="copyPrestige()" class="text-[#40e0d0] text-xs font-bold hover:underline">COPY TEXT</button>
                    <span class="text-slate-600 text-[10px]">REWRITTEN BY PUMPO AI</span>
                </div>
            </div>
        </div>

        <div id="loading" class="hidden text-center py-10">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-[#40e0d0] mb-4"></div>
            <p class="text-xs text-slate-500 font-bold uppercase tracking-widest">Refining Tone & Authority...</p>
        </div>
    </div>

    <script>
        let currentMode = 'Executive';

        function setMode(mode, btn) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function elevateText() {
            const key = document.getElementById('apiKey').value;
            const text = document.getElementById('inputText').value;
            if (!key || !text) return alert("Key and text required!");

            const btn = document.getElementById('elevateBtn');
            const loading = document.getElementById('loading');
            const outputSec = document.getElementById('outputSection');
            const bar = document.getElementById('status-bar-fill');
            const levelText = document.getElementById('level-text');

            btn.disabled = true;
            loading.classList.remove('hidden');
            outputSec.classList.add('hidden');
            bar.style.width = '100%';
            levelText.innerText = "Elevating...";

            const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;

            const prompt = `Rewrite the following text to sound high-status, highly intelligent, and ${currentMode}. 
            Keep the core meaning but use more sophisticated (yet clean) vocabulary. 
            Ensure the tone sounds confident and authoritative. 
            Text to rewrite: "${text}"`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const result = data.candidates[0].content.parts[0].text;

                document.getElementById('outputText').innerText = result;
                outputSec.classList.remove('hidden');
                levelText.innerText = "PRESTIGE ATTAINED";
            } catch (err) {
                alert("Elevation failed: " + err.message);
                bar.style.width = '0%';
                levelText.innerText = "Standard";
            } finally {
                btn.disabled = false;
                loading.classList.add('hidden');
            }
        }

        function copyPrestige() {
            const text = document.getElementById('outputText').innerText;
            navigator.clipboard.writeText(text);
            alert("Prestige text copied to clipboard.");
        }

        document.getElementById('elevateBtn').onclick = elevateText;
    </script>
</body>
</html>
