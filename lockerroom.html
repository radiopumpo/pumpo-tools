<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>LockerRoomAI | Pumpo Tools</title>
  <link rel="icon" type="image/png" href="https://radiopumpo.github.io/radiopumpologo.png">
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--pink:#ff0080;--cyan:#40e0d0;--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--text:#f0ede6;--muted:#666;--dimmed:#333;--green:#00c46a;--green2:#009952;--red:#e24b4a;--amber:#ffaa00;--teamA:#4da6ff;--teamB:#ff5555;--mono:'Space Mono',monospace;--sans:'Rajdhani',sans-serif;--display:'Black Ops One',cursive;--sc:#00c46a;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-text-size-adjust:100%;}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);pointer-events:none;z-index:9999;}
    .top-nav{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-end;padding:0 16px 10px;padding-top:max(12px,env(safe-area-inset-top));background:rgba(10,10,10,0.96);backdrop-filter:blur(12px);z-index:500;border-bottom:1px solid var(--border);}
    .nav-brand{font-family:var(--display);font-size:.85rem;color:var(--sc);letter-spacing:1px;text-decoration:none;transition:color .3s;}
    .nav-right{display:flex;gap:8px;align-items:center;}
    .nav-link{color:var(--muted);text-decoration:none;font-weight:700;font-size:.65rem;border:1px solid var(--border2);padding:4px 10px;border-radius:20px;font-family:var(--mono);transition:.2s;}
    .nav-link:hover{border-color:var(--cyan);color:var(--cyan);}
    .sport-tabs{position:fixed;left:0;right:0;z-index:490;background:rgba(10,10,10,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
    .sport-tabs::-webkit-scrollbar{display:none;}
    .sport-tabs-inner{display:flex;padding:0 10px;min-width:max-content;}
    .sport-tab{display:flex;align-items:center;gap:5px;padding:8px 12px;font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap;touch-action:manipulation;}
    .sport-tab:hover{color:var(--text);}
    .sport-tab.active{color:var(--sc);border-bottom-color:var(--sc);}
    .sport-tab-icon{font-size:13px;line-height:1;}
    .wrap{max-width:960px;margin:0 auto;padding:0 1rem 3rem;}
    .page-eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}
    .page-title{font-family:var(--display);font-size:clamp(22px,5vw,36px);color:var(--text);line-height:1;letter-spacing:.5px;margin-bottom:.3rem;}
    .page-title span{color:var(--sc);transition:color .3s;}
    .page-sub{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:.75rem;}
    .sport-badge{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 12px;margin-bottom:.75rem;font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--sc);transition:color .3s;}
    .key-bar{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.85rem 1rem;margin-bottom:.75rem;display:flex;flex-direction:column;gap:.5rem;}
    .key-bar-label{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;align-items:center;}
    .key-bar-label a{color:var(--green);text-decoration:none;font-size:8px;}
    .key-row{display:flex;gap:8px;}
    .key-input{flex:1;min-width:0;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px;padding:.45rem .8rem;border-radius:7px;outline:none;transition:border-color .15s;}
    .key-input:focus{border-color:var(--sc);}
    .key-input::placeholder{color:var(--dimmed);}
    .key-btn{background:var(--sc);color:#000;border:none;padding:.45rem 1rem;font-family:var(--display);font-size:10px;border-radius:7px;cursor:pointer;white-space:nowrap;transition:all .3s;}
    .key-status{font-family:var(--mono);font-size:9px;display:none;}
    .key-status.ok{color:var(--green);display:block;}
    .prompt-section{margin-bottom:.75rem;}
    .prompt-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
    .prompt-input{flex:1;min-width:200px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--sans);font-weight:600;font-size:14px;padding:.75rem 1rem;border-radius:10px;outline:none;transition:border-color .15s;}
    .prompt-input:focus{border-color:var(--sc);}
    .prompt-input::placeholder{color:var(--dimmed);}
    .generate-btn{background:var(--sc);color:#000;border:none;padding:.75rem 1.5rem;font-family:var(--display);font-size:13px;letter-spacing:.05em;border-radius:10px;cursor:pointer;transition:all .3s;white-space:nowrap;}
    .generate-btn:hover:not(:disabled){filter:brightness(1.15);transform:translateY(-1px);}
    .generate-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;}
    .quick-prompts{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.75rem;}
    .qp-btn{font-family:var(--mono);font-size:9px;letter-spacing:.08em;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:.15s;white-space:nowrap;touch-action:manipulation;}
    .qp-btn:hover{border-color:var(--sc);color:var(--sc);}
    .team-legend{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;flex-wrap:wrap;gap:8px;}
    .legend-item{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;}
    .legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
    .legend-name-input{background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:var(--sans);font-weight:700;font-size:13px;outline:none;width:100px;padding:2px 4px;}
    .legend-name-input:focus{border-bottom-color:var(--sc);}
    .pitch-wrap{position:relative;width:100%;border-radius:12px;overflow:hidden;margin-bottom:.75rem;box-shadow:0 8px 40px rgba(0,0,0,0.6);}
    .pitch-wrap.fullscreen{position:fixed;inset:0;z-index:800;border-radius:0;margin:0;}
    #pitch-svg{display:block;width:100%;height:auto;}
    .pitch-controls{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:6px;z-index:10;}
    .pitch-ctrl-btn{background:rgba(10,10,10,0.8);border:1px solid rgba(255,255,255,0.15);color:var(--muted);font-family:var(--mono);font-size:9px;letter-spacing:.08em;padding:5px 9px;border-radius:20px;cursor:pointer;transition:.2s;backdrop-filter:blur(6px);touch-action:manipulation;}
    .pitch-ctrl-btn:hover{border-color:var(--sc);color:var(--sc);}
    .explanation-panel{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:1rem 1.1rem;margin-bottom:.75rem;display:none;}
    .explanation-panel.visible{display:block;}
    .exp-label{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;}
    .exp-text{font-size:13px;line-height:1.7;color:var(--text);font-weight:600;}
    .saved-section{margin-bottom:.75rem;}
    .saved-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;}
    .saved-label{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
    .saved-list{display:flex;flex-wrap:wrap;gap:6px;}
    .saved-chip{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-family:var(--mono);font-size:9px;color:var(--muted);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:5px;}
    .saved-chip:hover{border-color:var(--sc);color:var(--sc);}
    .saved-chip .del{color:var(--dimmed);font-size:10px;}
    .saved-chip .del:hover{color:var(--red);}
    .export-row{display:flex;flex-wrap:wrap;gap:7px;padding-top:.75rem;border-top:1px solid var(--border);}
    .exp-btn{background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:.45rem .9rem;border-radius:20px;cursor:pointer;transition:.15s;touch-action:manipulation;}
    .exp-btn:hover{border-color:var(--cyan);color:var(--cyan);}
    .exp-btn.copied{border-color:var(--green);color:var(--green);}
    .loading-bar{height:2px;background:var(--border);overflow:hidden;border-radius:1px;margin-bottom:.5rem;display:none;}
    .loading-bar.active{display:block;}
    .loading-bar-i{height:100%;background:linear-gradient(to right,var(--sc),var(--cyan));animation:lp 1.6s ease-in-out infinite;}
    @keyframes lp{0%{width:0%;margin-left:0}50%{width:55%;margin-left:22%}100%{width:0%;margin-left:100%}}
    .err-msg{font-family:var(--mono);font-size:10px;color:var(--red);display:none;padding:.5rem 0;}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:600;display:none;align-items:center;justify-content:center;}
    .modal-backdrop.open{display:flex;}
    .modal{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:1.25rem;width:320px;max-width:90vw;}
    .modal-title{font-family:var(--display);font-size:16px;margin-bottom:1rem;color:var(--text);}
    .modal-input{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-weight:600;font-size:14px;padding:.65rem .9rem;border-radius:8px;outline:none;margin-bottom:.75rem;transition:border-color .15s;}
    .modal-input:focus{border-color:var(--sc);}
    .modal-input::placeholder{color:var(--dimmed);}
    .modal-btns{display:flex;gap:8px;}
    .modal-btn{flex:1;padding:.7rem;font-family:var(--display);font-size:12px;border:none;border-radius:8px;cursor:pointer;transition:.2s;}
    .modal-btn.primary{background:var(--sc);color:#000;}
    .modal-btn.secondary{background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:var(--mono);font-size:10px;}
    .fullscreen-close{position:fixed;top:16px;right:16px;z-index:810;background:rgba(10,10,10,0.9);border:1px solid var(--border2);color:var(--muted);font-family:var(--mono);font-size:10px;padding:6px 12px;border-radius:20px;cursor:pointer;display:none;transition:.2s;}
    .fullscreen-close.visible{display:block;}
    .fullscreen-close:hover{border-color:var(--sc);color:var(--sc);}
    @media(max-width:600px){.prompt-row{flex-direction:column;}.generate-btn{width:100%;}}
  </style>
</head>
<body>

<nav class="top-nav" id="topNav">
  <a href="index.html" class="nav-brand">LOCKERROOM<span style="color:var(--cyan)">AI</span></a>
  <div class="nav-right"><a href="index.html" class="nav-link">← HUB</a></div>
</nav>

<div class="sport-tabs" id="sportTabs">
  <div class="sport-tabs-inner" id="sportTabsInner"></div>
</div>

<button class="fullscreen-close" id="fullscreen-close" onclick="exitFullscreen()">✕ Exit Fullscreen</button>

<div class="wrap" id="mainWrap">
  <div class="page-eyebrow">pumpo tools // tactics board</div>
  <div class="page-title">LOCKER<span id="titleAccent">ROOM</span>AI</div>
  <div class="page-sub">Describe any tactical scenario in plain language. AI renders it on the surface.</div>
  <div class="sport-badge" id="sportBadge">⚽ Football</div>

  <div class="key-bar">
    <div class="key-bar-label">
      <span>Gemini API Key — required</span>
      <a href="https://aistudio.google.com/app/apikey" target="_blank">Get free key ↗</a>
    </div>
    <div class="key-row">
      <input type="password" class="key-input" id="gemini-key" placeholder="Paste Gemini API key..." autocomplete="off">
      <button class="key-btn" onclick="saveKey()">SAVE</button>
    </div>
    <div class="key-status" id="key-status"></div>
  </div>

  <div class="prompt-section">
    <div class="prompt-row">
      <input type="text" class="prompt-input" id="prompt-input" placeholder="Describe the tactical situation..." onkeydown="if(event.key==='Enter')generate()">
      <button class="generate-btn" id="gen-btn" onclick="generate()">GENERATE →</button>
    </div>
    <div class="loading-bar" id="loading-bar"><div class="loading-bar-i"></div></div>
    <div class="err-msg" id="err-msg"></div>
  </div>

  <div class="quick-prompts" id="quickPrompts"></div>

  <div class="team-legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--teamA)"></div>
      <input class="legend-name-input" id="team-a-name" value="Home" maxlength="20">
      <span style="font-size:11px;color:var(--muted);font-family:var(--mono)">→</span>
    </div>
    <div style="font-family:var(--mono);font-size:9px;color:var(--dimmed)">VS</div>
    <div class="legend-item">
      <input class="legend-name-input" id="team-b-name" value="Away" maxlength="20" style="text-align:right">
      <span style="font-size:11px;color:var(--muted);font-family:var(--mono)">←</span>
      <div class="legend-dot" style="background:var(--teamB)"></div>
    </div>
  </div>

  <div class="pitch-wrap" id="pitch-wrap">
    <svg id="pitch-svg" viewBox="0 0 105 68" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;height:auto"></svg>
    <div class="pitch-controls">
      <button class="pitch-ctrl-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
      <button class="pitch-ctrl-btn" onclick="resetToDefault()">↺ Reset</button>
    </div>
  </div>

  <div class="explanation-panel" id="explanation-panel">
    <div class="exp-label">AI Tactical Interpretation</div>
    <div class="exp-text" id="exp-text"></div>
  </div>

  <div class="saved-section" id="saved-section" style="display:none">
    <div class="saved-header"><div class="saved-label">Saved Tactics</div></div>
    <div class="saved-list" id="saved-list"></div>
  </div>

  <div class="export-row">
    <button class="exp-btn" onclick="saveTactic()">Save tactic</button>
    <button class="exp-btn" onclick="exportJSON()">Export JSON</button>
    <button class="exp-btn" onclick="copyExplanation(this)">Copy explanation</button>
    <button class="exp-btn" onclick="screenshotPitch()">Screenshot pitch</button>
  </div>
</div>

<div class="modal-backdrop" id="save-modal">
  <div class="modal">
    <div class="modal-title">Save Tactic</div>
    <input type="text" class="modal-input" id="save-name" placeholder="Name this tactic..." maxlength="40">
    <div class="modal-btns">
      <button class="modal-btn primary" onclick="confirmSave()">SAVE</button>
      <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// SPORT DEFINITIONS
// ═══════════════════════════════════════════
const SPORTS={
football:{id:'football',label:'Football',icon:'⚽',color:'#00c46a',vb:'0 0 105 68',tl:['Home','Away'],
qp:[['4-4-2 Kickoff','4-4-2 default formation, kickoff'],['Corner Attack','Offensive corner kick, near post run, 6 players in box'],['Free Kick Defense','Defensive free kick, zonal marking wall of 4, goalkeeper positioned'],['High Press','High press from Team A, all players pushed up, Team B goalkeeper has ball'],['Counter Attack','Counter attack, Team B wins ball in midfield, 3 players breaking forward fast'],['Penalty','Penalty kick, Team A taking, goalkeeper diving right']],
sp:`You are a football (soccer) tactics engine. Convert the user description into a JSON object for a football pitch.
COORDINATE SYSTEM: Pitch 105 wide (x) x 68 tall (y top-to-bottom). Team A (blue) attacks LEFT TO RIGHT, GK near x=5, LB=low y, RB=high y. Team B (red) attacks RIGHT TO LEFT, GK near x=100. Centre: x=52.5,y=34. Penalty spots: x=11,x=94. Penalty areas: x=0-16.5 and x=88.5-105, y=13.84-54.16.
ROLES: GK RB LB CB RWB LWB CDM CM CAM RM LM RW LW SS ST CF
Return ONLY valid JSON: {"teamA":[{"role":"GK","x":5,"y":34}],"teamB":[{"role":"GK","x":100,"y":34}],"ball":{"x":52.5,"y":34},"explanation":"2-3 sentences."}
Rules: 11 players each, within bounds (x:0-105,y:0-68), no overlap, GK near own goal.`,
def:{teamA:[{role:'GK',x:5,y:34},{role:'RB',x:20,y:55},{role:'CB',x:20,y:42},{role:'CB',x:20,y:26},{role:'LB',x:20,y:13},{role:'RM',x:44,y:55},{role:'CM',x:44,y:42},{role:'CM',x:44,y:26},{role:'LM',x:44,y:13},{role:'ST',x:48,y:38},{role:'ST',x:48,y:30}],teamB:[{role:'GK',x:100,y:34},{role:'LB',x:85,y:55},{role:'CB',x:85,y:42},{role:'CB',x:85,y:26},{role:'RB',x:85,y:13},{role:'LM',x:61,y:55},{role:'CM',x:61,y:42},{role:'CM',x:61,y:26},{role:'RM',x:61,y:13},{role:'ST',x:57,y:38},{role:'ST',x:57,y:30}],ball:{x:52.5,y:34},explanation:'Default 4-4-2 formation. Team A attacks left to right, Team B right to left. Ball at centre spot.'},
render:renderFootball},

basketball:{id:'basketball',label:'Basketball',icon:'🏀',color:'#ff8c00',vb:'0 0 94 50',tl:['Home','Away'],
qp:[['Pick & Roll','Point guard drives right, center sets screen at elbow, roll to basket'],['Zone Defense','Team B 2-3 zone defense, Team A at top of key with ball'],['Fast Break','Team A fast break, 3-on-2, ball handler at center, two wings wide'],['Box Out','Team A shooting free throws, both teams boxing out for rebound'],['Isolation','Isolation play, Team A best player left wing, 4 players cleared out'],['Press Break','Team B full court press, Team A inbounding from baseline']],
sp:`You are a basketball tactics engine. Convert the user description into player positions on a basketball court.
COORDINATE SYSTEM: Court 94 wide (x) x 50 tall (y). Team A (blue) attacks LEFT TO RIGHT, basket at x=88.5,y=25. Team B (red) attacks RIGHT TO LEFT, basket at x=5.5,y=25. Half court: x=47. Left key: x=0-19,y=17-33. Right key: x=75-94,y=17-33.
ROLES: PG SG SF PF C
Return ONLY valid JSON: {"teamA":[{"role":"PG","x":35,"y":25}],"teamB":[{"role":"PG","x":59,"y":25}],"ball":{"x":47,"y":25},"explanation":"2-3 sentences."}
Rules: 5 players each, within bounds (x:0-94,y:0-50), no overlap.`,
def:{teamA:[{role:'PG',x:35,y:25},{role:'SG',x:28,y:10},{role:'SF',x:28,y:40},{role:'PF',x:18,y:18},{role:'C',x:15,y:25}],teamB:[{role:'PG',x:59,y:25},{role:'SG',x:66,y:10},{role:'SF',x:66,y:40},{role:'PF',x:76,y:18},{role:'C',x:79,y:25}],ball:{x:47,y:25},explanation:'Default half-court setup. Both teams facing each other. Team A attacks right basket, Team B attacks left.'},
render:renderBasketball},

icehockey:{id:'icehockey',label:'Ice Hockey',icon:'🏒',color:'#7ecfff',vb:'0 0 100 42',tl:['Home','Away'],
qp:[['5-on-5 Neutral','Standard 5-on-5 neutral zone face-off, both teams lined up'],['Power Play','Team A on 5-on-4 power play, umbrella formation in offensive zone'],['Penalty Kill','Team B penalty kill box formation, Team A circulating with puck'],['Breakout','Team A breakout from defensive zone, D-to-D pass, wingers stretching'],['Forecheck','Team A aggressive 2-1-2 forecheck in Team B defensive zone'],['Shootout','Shootout, Team A shooter at center ice, Team B goalie in crease']],
sp:`You are an ice hockey tactics engine. Convert the user description into player positions on a hockey rink.
COORDINATE SYSTEM: Rink 100 wide (x) x 42 tall (y). Team A (blue) attacks LEFT TO RIGHT, goalie crease at x=94,y=21. Team B (red) attacks RIGHT TO LEFT, goalie crease at x=6,y=21. Center face-off: x=50,y=21. Blue lines: x=25 and x=75. "ball" = puck position.
ROLES: G LD RD LW C RW
Return ONLY valid JSON: {"teamA":[{"role":"G","x":94,"y":21}],"teamB":[{"role":"G","x":6,"y":21}],"ball":{"x":50,"y":21},"explanation":"2-3 sentences."}
Rules: 6 players each (including goalie), within bounds (x:0-100,y:0-42), no overlap.`,
def:{teamA:[{role:'G',x:94,y:21},{role:'LD',x:70,y:15},{role:'RD',x:70,y:27},{role:'LW',x:52,y:10},{role:'C',x:50,y:21},{role:'RW',x:52,y:32}],teamB:[{role:'G',x:6,y:21},{role:'LD',x:30,y:15},{role:'RD',x:30,y:27},{role:'LW',x:48,y:10},{role:'C',x:50,y:21},{role:'RW',x:48,y:32}],ball:{x:50,y:21},explanation:'Standard 5-on-5 neutral zone setup. Both teams facing off at center ice. Puck at center.'},
render:renderIceHockey},

volleyball:{id:'volleyball',label:'Volleyball',icon:'🏐',color:'#ffdd00',vb:'0 0 54 27',tl:['Home','Away'],

// ═══════════════════════════════════════════
// SPORT SWITCHING
// ═══════════════════════════════════════════
function buildTabs(){
  document.getElementById('sportTabsInner').innerHTML=Object.values(SPORTS).map(s=>
    `<button class="sport-tab ${s.id===CSI?'active':''}" id="tab-${s.id}" onclick="switchSport('${s.id}')"><span class="sport-tab-icon">${s.icon}</span>${s.label}</button>`
  ).join('');
}

function setSC(color){
  document.documentElement.style.setProperty('--sc',color);
}

function switchSport(id){
  if(!SPORTS[id])return;
  CSI=id; localStorage.setItem('lrai_sport',id);
  const sp=SPORTS[id];
  document.querySelectorAll('.sport-tab').forEach(t=>t.classList.toggle('active',t.id==='tab-'+id));
  setSC(sp.color);
  document.getElementById('sportBadge').textContent=sp.icon+' '+sp.label;
  document.getElementById('team-a-name').value=sp.tl[0];
  document.getElementById('team-b-name').value=sp.tl[1];
  document.getElementById('pitch-svg').setAttribute('viewBox',sp.vb);
  buildQP(sp);
  CS=sp.def;
  renderPitch(sp.def);
  document.getElementById('explanation-panel').classList.remove('visible');
  document.getElementById('prompt-input').value='';
  document.getElementById('prompt-input').placeholder='Describe a '+sp.label.toLowerCase()+' tactical situation...';
  document.getElementById('tab-'+id)?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function buildQP(sp){
  document.getElementById('quickPrompts').innerHTML=sp.qp.map(([l,p])=>
    `<button class="qp-btn" onclick="quickPrompt(this.dataset.p)" data-p="${p.replace(/"/g,'&quot;')}">${l}</button>`
  ).join('');
}

function aD(){return`<marker id="arrowA" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#4da6ff" opacity="0.9"/></marker><marker id="arrowB" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#ff5555" opacity="0.9"/></marker><marker id="arrowW" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="white" opacity="0.9"/></marker>`;}

function rArrows(sc){
  let s='';
  [...(sc.teamA||[]).map(p=>({...p,t:'A'})),...(sc.teamB||[]).map(p=>({...p,t:'B'}))].forEach(p=>{
    if(p.dx===undefined)return;
    const c=p.t==='A'?'rgba(77,166,255,0.8)':'rgba(255,85,85,0.8)',m=p.t==='A'?'arrowA':'arrowB';
    s+=`<line x1="${p.x}" y1="${p.y}" x2="${p.x+p.dx}" y2="${p.y+p.dy}" stroke="${c}" stroke-width="0.6" stroke-dasharray="1.5,0.8" marker-end="url(#${m})"/>`;
  });
  if(sc.ball?.dx!==undefined) s+=`<line x1="${sc.ball.x}" y1="${sc.ball.y}" x2="${sc.ball.x+sc.ball.dx}" y2="${sc.ball.y+sc.ball.dy}" stroke="rgba(255,255,255,0.9)" stroke-width="0.5" marker-end="url(#arrowW)"/>`;
  return s;
}

function rPlayers(sc,r,fs){
  let s='';
  const rp=(pl,fill,st)=>pl.forEach(p=>{s+=`<g><circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${fill}" stroke="${st}" stroke-width="0.4"/><text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="central" font-size="${fs}" font-family="Space Mono,monospace" font-weight="700" fill="white" opacity="0.95">${esc(p.role||'')}</text></g>`;});
  rp(sc.teamA||[],'#4da6ff','#1a7acc');
  rp(sc.teamB||[],'#ff5555','#cc2222');
  return s;
}

function rBall(sc,r){return sc.ball?`<circle cx="${sc.ball.x}" cy="${sc.ball.y}" r="${r}" fill="white" stroke="rgba(0,0,0,0.35)" stroke-width="0.25"/>`:''}

  if(!GK){showErr('Gemini API key required.');return;}
  const sp=SPORTS[CSI];
  const tA=document.getElementById('team-a-name').value.trim()||sp.tl[0];
  const tB=document.getElementById('team-b-name').value.trim()||sp.tl[1];
  setLoading(true);clearErr();
  try{
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GK}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:`${sp.sp}\n\nTeam A name: ${tA}. Team B name: ${tB}.\n\nUSER PROMPT: ${prompt}`}]}]})});
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${res.status}`);}
    const data=await res.json();
    const raw=data.candidates[0].content.parts[0].text;
    const clean=raw.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
    const sc=JSON.parse(clean);
    if(!sc.teamA||!sc.teamB||!sc.ball)throw new Error('Invalid response structure.');
    CS=sc;renderPitch(sc);showExplanation(sc.explanation||'');setLoading(false);
  }catch(e){setLoading(false);showErr('Error: '+e.message);console.error('[lrai]',e);}
}

function quickPrompt(text){document.getElementById('prompt-input').value=text;generate();}

// ═══════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════
function saveKey(){const v=document.getElementById('gemini-key').value.trim();if(!v)return;GK=v;localStorage.setItem('lrai_gemini_key',v);showKeyStatus('Key saved.',true);}
function showKeyStatus(m,ok){const el=document.getElementById('key-status');el.textContent=m;el.className='key-status'+(ok?' ok':'');el.style.display='block';}
function showExplanation(t){document.getElementById('exp-text').textContent=t;document.getElementById('explanation-panel').classList.add('visible');}
function resetToDefault(){CS=SPORTS[CSI].def;document.getElementById('prompt-input').value='';document.getElementById('explanation-panel').classList.remove('visible');renderPitch(CS);}
function toggleFullscreen(){document.getElementById('pitch-wrap').classList.add('fullscreen');document.getElementById('fullscreen-close').classList.add('visible');document.body.style.overflow='hidden';}
function exitFullscreen(){document.getElementById('pitch-wrap').classList.remove('fullscreen');document.getElementById('fullscreen-close').classList.remove('visible');document.body.style.overflow='';}
function setLoading(on){document.getElementById('loading-bar').className='loading-bar'+(on?' active':'');const b=document.getElementById('gen-btn');b.disabled=on;b.textContent=on?'GENERATING...':'GENERATE →';}
function showErr(m){const el=document.getElementById('err-msg');el.textContent=m;el.style.display='block';}
function clearErr(){document.getElementById('err-msg').style.display='none';}
function esc(s){if(typeof s!=='string')return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function saveTactic(){if(!CS)return;document.getElementById('save-name').value='';document.getElementById('save-modal').classList.add('open');setTimeout(()=>document.getElementById('save-name').focus(),100);}
function confirmSave(){
  const n=document.getElementById('save-name').value.trim();if(!n)return;
  ST.unshift({id:Date.now().toString(36),name:n,sport:CSI,scenario:CS,prompt:document.getElementById('prompt-input').value.trim(),saved:Date.now()});
  if(ST.length>20)ST=ST.slice(0,20);
  localStorage.setItem('lrai_saved',JSON.stringify(ST));closeModal();renderSaved();
}
function loadSaved(id){
  const e=ST.find(t=>t.id===id);if(!e)return;
  if(e.sport&&e.sport!==CSI)switchSport(e.sport);
  CS=e.scenario;document.getElementById('prompt-input').value=e.prompt||'';
  renderPitch(e.scenario);showExplanation(e.scenario.explanation||'');
}
function deleteSaved(id,e){e.stopPropagation();ST=ST.filter(t=>t.id!==id);localStorage.setItem('lrai_saved',JSON.stringify(ST));renderSaved();}
function renderSaved(){
  const sec=document.getElementById('saved-section'),list=document.getElementById('saved-list');
  if(!ST.length){sec.style.display='none';return;}
  sec.style.display='block';
  list.innerHTML=ST.map(t=>{const sp=SPORTS[t.sport||'football'];return`<div class="saved-chip" onclick="loadSaved('${t.id}')"><span>${sp?sp.icon:'⚽'}</span>${esc(t.name)}<span class="del" onclick="deleteSaved('${t.id}',event)">✕</span></div>`;}).join('');
}
function closeModal(){document.getElementById('save-modal').classList.remove('open');}

function exportJSON(){
  if(!CS)return;
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify({...CS,sport:CSI,teamA_name:document.getElementById('team-a-name').value,teamB_name:document.getElementById('team-b-name').value,exported:new Date().toISOString()},null,2));
  a.download='lockerroom-tactic.json';a.click();
}
function copyExplanation(btn){
  const t=document.getElementById('exp-text').textContent;if(!t)return;
  navigator.clipboard.writeText(t).then(()=>{btn.textContent='Copied!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copy explanation';btn.classList.remove('copied');},2000);});
}
function screenshotPitch(){
  const svg=document.getElementById('pitch-svg');
  const sd=new XMLSerializer().serializeToString(svg);
  const canvas=document.createElement('canvas');
  const bb=svg.getBoundingClientRect();
  canvas.width=Math.max(bb.width*2,840);canvas.height=Math.max(bb.height*2,544);
  const ctx=canvas.getContext('2d');
  const img=new Image();
  const url=URL.createObjectURL(new Blob([sd],{type:'image/svg+xml;charset=utf-8'}));
  img.onload=()=>{ctx.drawImage(img,0,0,canvas.width,canvas.height);URL.revokeObjectURL(url);const a=document.createElement('a');a.download='lockerroom-tactic.png';a.href=canvas.toDataURL('image/png');a.click();};
  img.src=url;
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
window.onload=function(){
  const nav=document.getElementById('topNav');
  const tabs=document.getElementById('sportTabs');
  const wrap=document.getElementById('mainWrap');
  function positionTabs(){
    const nH=nav.offsetHeight;
    tabs.style.top=nH+'px';
    wrap.style.paddingTop=(nH+tabs.offsetHeight+14)+'px';
  }
  positionTabs();
  window.addEventListener('resize',positionTabs);
  if(GK){document.getElementById('gemini-key').value=GK;showKeyStatus('Key loaded.',true);}
  buildTabs();
  setSC(SPORTS[CSI].color);
  buildQP(SPORTS[CSI]);
  document.getElementById('sportBadge').textContent=SPORTS[CSI].icon+' '+SPORTS[CSI].label;
  document.getElementById('team-a-name').value=SPORTS[CSI].tl[0];
  document.getElementById('team-b-name').value=SPORTS[CSI].tl[1];
  document.getElementById('pitch-svg').setAttribute('viewBox',SPORTS[CSI].vb);
  CS=SPORTS[CSI].def;
  renderPitch(CS);
  renderSaved();
};
</script>
