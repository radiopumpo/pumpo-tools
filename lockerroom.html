<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>LockerRoomAI | Pumpo Tools</title>
  <link rel="icon" type="image/png" href="https://radiopumpo.github.io/radiopumpologo.png">
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #ff0080;
      --cyan: #40e0d0;
      --bg: #0a0a0a;
      --bg2: #111;
      --bg3: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --text: #f0ede6;
      --muted: #666;
      --dimmed: #333;
      --green: #00c46a;
      --green2: #009952;
      --red: #e24b4a;
      --amber: #ffaa00;
      --teamA: #4da6ff;
      --teamB: #ff5555;
      --mono: 'Space Mono', monospace;
      --sans: 'Rajdhani', sans-serif;
      --display: 'Black Ops One', cursive;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
      pointer-events: none; z-index: 9999;
    }

    /* NAV */
    .top-nav {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: flex-end;
      padding: 0 16px 10px;
      padding-top: max(12px, env(safe-area-inset-top));
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      z-index: 500;
      border-bottom: 1px solid var(--border);
    }
    .nav-brand { font-family: var(--display); font-size: .85rem; color: var(--green); letter-spacing: 1px; text-decoration: none; }
    .nav-right { display: flex; gap: 8px; align-items: center; }
    .nav-link { color: var(--muted); text-decoration: none; font-weight: 700; font-size: .65rem; border: 1px solid var(--border2); padding: 4px 10px; border-radius: 20px; font-family: var(--mono); transition: .2s; }
    .nav-link:hover { border-color: var(--cyan); color: var(--cyan); }

    /* WRAP */
    .wrap { max-width: 960px; margin: 0 auto; padding: calc(max(52px, env(safe-area-inset-top) + 42px) + 8px) 1rem 2rem; }

    /* HEADER */
    .page-eyebrow { font-family: var(--mono); font-size: 9px; letter-spacing: .22em; text-transform: uppercase; color: var(--muted); margin-bottom: .4rem; }
    .page-title { font-family: var(--display); font-size: clamp(24px, 5vw, 38px); color: var(--text); line-height: 1; letter-spacing: .5px; margin-bottom: .35rem; }
    .page-title span { color: var(--green); }
    .page-sub { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 1.25rem; }

    /* KEY FIELD */
    .key-bar { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: .85rem 1rem; margin-bottom: 1rem; display: flex; flex-direction: column; gap: .5rem; }
    .key-bar-label { font-family: var(--mono); font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); display: flex; justify-content: space-between; align-items: center; }
    .key-bar-label a { color: var(--green); text-decoration: none; font-size: 8px; }
    .key-row { display: flex; gap: 8px; }
    .key-input { flex: 1; min-width: 0; background: var(--bg2); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 11px; padding: .45rem .8rem; border-radius: 7px; outline: none; transition: border-color .15s; }
    .key-input:focus { border-color: var(--green); }
    .key-input::placeholder { color: var(--dimmed); }
    .key-btn { background: var(--green); color: #000; border: none; padding: .45rem 1rem; font-family: var(--display); font-size: 10px; border-radius: 7px; cursor: pointer; white-space: nowrap; transition: .2s; }
    .key-btn:hover { background: var(--green2); color: #fff; }
    .key-status { font-family: var(--mono); font-size: 9px; display: none; }
    .key-status.ok { color: var(--green); display: block; }

    /* PROMPT BAR */
    .prompt-section { margin-bottom: 1rem; }
    .prompt-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .prompt-input {
      flex: 1; min-width: 200px;
      background: var(--bg3); border: 1px solid var(--border2);
      color: var(--text); font-family: var(--sans); font-weight: 600;
      font-size: 14px; padding: .75rem 1rem;
      border-radius: 10px; outline: none; transition: border-color .15s;
    }
    .prompt-input:focus { border-color: var(--green); }
    .prompt-input::placeholder { color: var(--dimmed); }
    .generate-btn {
      background: var(--green); color: #000;
      border: none; padding: .75rem 1.5rem;
      font-family: var(--display); font-size: 13px; letter-spacing: .05em;
      border-radius: 10px; cursor: pointer; transition: all .2s;
      white-space: nowrap;
    }
    .generate-btn:hover:not(:disabled) { background: var(--green2); color: #fff; transform: translateY(-1px); }
    .generate-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }

    /* QUICK PROMPTS */
    .quick-prompts { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; }
    .qp-btn { font-family: var(--mono); font-size: 9px; letter-spacing: .08em; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; transition: .15s; white-space: nowrap; }
    .qp-btn:hover { border-color: var(--green); color: var(--green); }

    /* PITCH CONTAINER */
    .pitch-wrap {
      position: relative;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 1rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .pitch-wrap.fullscreen {
      position: fixed; inset: 0; z-index: 800;
      border-radius: 0; margin: 0;
    }

    #pitch-svg {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Player elements */
    .player-group { cursor: default; }
    .player-circle {
      transition: cx .6s cubic-bezier(.4,0,.2,1), cy .6s cubic-bezier(.4,0,.2,1);
    }
    .player-label {
      transition: x .6s cubic-bezier(.4,0,.2,1), y .6s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
    }
    .arrow-line {
      transition: all .6s cubic-bezier(.4,0,.2,1);
    }

    /* Pitch controls overlay */
    .pitch-controls {
      position: absolute; top: 10px; right: 10px;
      display: flex; flex-direction: column; gap: 6px;
      z-index: 10;
    }
    .pitch-ctrl-btn {
      background: rgba(10,10,10,0.8);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--muted); font-family: var(--mono);
      font-size: 9px; letter-spacing: .08em;
      padding: 5px 9px; border-radius: 20px;
      cursor: pointer; transition: .2s;
      backdrop-filter: blur(6px);
    }
    .pitch-ctrl-btn:hover { border-color: var(--green); color: var(--green); }

    /* Team legend */
    .team-legend {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: .75rem; flex-wrap: wrap; gap: 8px;
    }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 700; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .legend-name-input {
      background: transparent; border: none; border-bottom: 1px solid var(--border2);
      color: var(--text); font-family: var(--sans); font-weight: 700; font-size: 13px;
      outline: none; width: 120px; padding: 2px 4px;
    }
    .legend-name-input:focus { border-bottom-color: var(--green); }

    /* EXPLANATION PANEL */
    .explanation-panel {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 10px; padding: 1rem 1.1rem;
      margin-bottom: 1rem; display: none;
    }
    .explanation-panel.visible { display: block; }
    .exp-label { font-family: var(--mono); font-size: 9px; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-bottom: .5rem; }
    .exp-text { font-size: 13px; line-height: 1.7; color: var(--text); font-weight: 600; }

    /* SAVED TACTICS */
    .saved-section { margin-bottom: 1rem; }
    .saved-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: .5rem; }
    .saved-label { font-family: var(--mono); font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); }
    .saved-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .saved-chip {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 10px;
      font-family: var(--mono); font-size: 9px; color: var(--muted);
      cursor: pointer; transition: .15s; display: flex; align-items: center; gap: 6px;
    }
    .saved-chip:hover { border-color: var(--green); color: var(--green); }
    .saved-chip .del { color: var(--dimmed); font-size: 10px; }
    .saved-chip .del:hover { color: var(--red); }

    /* EXPORT ROW */
    .export-row { display: flex; flex-wrap: wrap; gap: 7px; padding-top: .75rem; border-top: 1px solid var(--border); }
    .exp-btn {
      background: transparent; border: 1px solid var(--border2);
      color: var(--muted); font-family: var(--mono); font-size: 9px;
      letter-spacing: .1em; text-transform: uppercase;
      padding: .45rem .9rem; border-radius: 20px; cursor: pointer; transition: .15s;
    }
    .exp-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .exp-btn.copied { border-color: var(--green); color: var(--green); }

    /* LOADING */
    .loading-bar { height: 2px; background: var(--border); overflow: hidden; border-radius: 1px; margin-bottom: .5rem; display: none; }
    .loading-bar.active { display: block; }
    .loading-bar-i { height: 100%; background: linear-gradient(to right, var(--green), var(--cyan)); animation: lp 1.6s ease-in-out infinite; }
    @keyframes lp { 0%{width:0%;margin-left:0} 50%{width:55%;margin-left:22%} 100%{width:0%;margin-left:100%} }

    /* ERR */
    .err-msg { font-family: var(--mono); font-size: 10px; color: var(--red); display: none; padding: .5rem 0; }

    /* SAVE MODAL */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 600; display: none; align-items: center; justify-content: center; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--bg3); border: 1px solid var(--border2); border-radius: 12px; padding: 1.25rem; width: 320px; max-width: 90vw; }
    .modal-title { font-family: var(--display); font-size: 16px; margin-bottom: 1rem; color: var(--text); }
    .modal-input { width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--text); font-family: var(--sans); font-weight: 600; font-size: 14px; padding: .65rem .9rem; border-radius: 8px; outline: none; margin-bottom: .75rem; transition: border-color .15s; }
    .modal-input:focus { border-color: var(--green); }
    .modal-input::placeholder { color: var(--dimmed); }
    .modal-btns { display: flex; gap: 8px; }
    .modal-btn { flex: 1; padding: .7rem; font-family: var(--display); font-size: 12px; border: none; border-radius: 8px; cursor: pointer; transition: .2s; }
    .modal-btn.primary { background: var(--green); color: #000; }
    .modal-btn.secondary { background: transparent; border: 1px solid var(--border2); color: var(--muted); font-family: var(--mono); font-size: 10px; }

    /* Fullscreen close btn */
    .fullscreen-close {
      position: fixed; top: 16px; right: 16px; z-index: 810;
      background: rgba(10,10,10,0.9); border: 1px solid var(--border2);
      color: var(--muted); font-family: var(--mono); font-size: 10px;
      padding: 6px 12px; border-radius: 20px; cursor: pointer;
      display: none; transition: .2s;
    }
    .fullscreen-close.visible { display: block; }
    .fullscreen-close:hover { border-color: var(--green); color: var(--green); }

    @media (max-width: 600px) {
      .prompt-row { flex-direction: column; }
      .generate-btn { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="top-nav">
    <a href="index.html" class="nav-brand">LOCKERROOM<span style="color:var(--cyan)">AI</span></a>
    <div class="nav-right">
      <a href="index.html" class="nav-link">← HUB</a>
    </div>
  </nav>

  <!-- FULLSCREEN CLOSE -->
  <button class="fullscreen-close" id="fullscreen-close" onclick="exitFullscreen()">✕ Exit Fullscreen</button>

  <div class="wrap">

    <div class="page-eyebrow">pumpo tools // tactics board</div>
    <div class="page-title">LOCKER<span>ROOM</span>AI</div>
    <div class="page-sub">Describe any tactical scenario in plain language. AI renders it on the pitch.</div>

    <!-- API KEY -->
    <div class="key-bar">
      <div class="key-bar-label">
        <span>Gemini API Key — required</span>
        <a href="https://aistudio.google.com/app/apikey" target="_blank">Get free key ↗</a>
      </div>
      <div class="key-row">
        <input type="password" class="key-input" id="gemini-key" placeholder="Paste Gemini API key..." autocomplete="off">
        <button class="key-btn" onclick="saveKey()">SAVE</button>
      </div>
      <div class="key-status" id="key-status"></div>
    </div>

    <!-- PROMPT -->
    <div class="prompt-section">
      <div class="prompt-row">
        <input type="text" class="prompt-input" id="prompt-input" placeholder="e.g. Offensive free kick from right side, 7 in the box, 1 outside, 2 back at midfield..." onkeydown="if(event.key==='Enter')generate()">
        <button class="generate-btn" id="gen-btn" onclick="generate()">GENERATE →</button>
      </div>
      <div class="loading-bar" id="loading-bar"><div class="loading-bar-i"></div></div>
      <div class="err-msg" id="err-msg"></div>
    </div>

    <!-- QUICK PROMPTS -->
    <div class="quick-prompts">
      <button class="qp-btn" onclick="quickPrompt('4-4-2 default formation, kickoff')">4-4-2 Kickoff</button>
      <button class="qp-btn" onclick="quickPrompt('Offensive corner kick, near post run, 6 players in box')">Corner Attack</button>
      <button class="qp-btn" onclick="quickPrompt('Defensive free kick, zonal marking wall of 4, goalkeeper positioned')">Free Kick Defense</button>
      <button class="qp-btn" onclick="quickPrompt('High press from Team A, all players pushed up, Team B goalkeeper has ball')">High Press</button>
      <button class="qp-btn" onclick="quickPrompt('Counter attack, Team B wins ball in midfield, 3 players breaking forward fast')">Counter Attack</button>
      <button class="qp-btn" onclick="quickPrompt('Penalty kick, Team A taking, goalkeeper diving right')">Penalty</button>
    </div>

    <!-- TEAM LEGEND -->
    <div class="team-legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--teamA)"></div>
        <input class="legend-name-input" id="team-a-name" value="Home" maxlength="20">
        <span style="font-size:11px;color:var(--muted);font-family:var(--mono)">→</span>
      </div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--dimmed)">VS</div>
      <div class="legend-item">
        <input class="legend-name-input" id="team-b-name" value="Away" maxlength="20" style="text-align:right">
        <span style="font-size:11px;color:var(--muted);font-family:var(--mono)">←</span>
        <div class="legend-dot" style="background:var(--teamB)"></div>
      </div>
    </div>

    <!-- PITCH -->
    <div class="pitch-wrap" id="pitch-wrap">
      <svg id="pitch-svg" viewBox="0 0 105 68" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;height:auto"></svg>
      <div class="pitch-controls">
        <button class="pitch-ctrl-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
        <button class="pitch-ctrl-btn" onclick="resetToDefault()">↺ Reset</button>
      </div>
    </div>

    <!-- EXPLANATION -->
    <div class="explanation-panel" id="explanation-panel">
      <div class="exp-label">AI Tactical Interpretation</div>
      <div class="exp-text" id="exp-text"></div>
    </div>

    <!-- SAVED TACTICS -->
    <div class="saved-section" id="saved-section" style="display:none">
      <div class="saved-header">
        <div class="saved-label">Saved Tactics</div>
      </div>
      <div class="saved-list" id="saved-list"></div>
    </div>

    <!-- EXPORT -->
    <div class="export-row">
      <button class="exp-btn" onclick="saveTactic()">Save tactic</button>
      <button class="exp-btn" onclick="exportJSON()">Export JSON</button>
      <button class="exp-btn" onclick="copyExplanation(this)">Copy explanation</button>
      <button class="exp-btn" onclick="screenshotPitch()">Screenshot pitch</button>
    </div>

  </div>

  <!-- SAVE MODAL -->
  <div class="modal-backdrop" id="save-modal">
    <div class="modal">
      <div class="modal-title">Save Tactic</div>
      <input type="text" class="modal-input" id="save-name" placeholder="Name this tactic..." maxlength="40">
      <div class="modal-btns">
        <button class="modal-btn primary" onclick="confirmSave()">SAVE</button>
        <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
  // ── STATE ─────────────────────────────────────────────────────────────────
  let geminiKey = localStorage.getItem('lrai_gemini_key') || '';
  let currentScenario = null;
  let savedTactics = JSON.parse(localStorage.getItem('lrai_saved') || '[]');

  // Pitch dimensions (SVG viewBox 0 0 105 68 — standard football pitch proportions)
  const PW = 105, PH = 68;

  // ── DEFAULT 4-4-2 ─────────────────────────────────────────────────────────
  const DEFAULT_SCENARIO = {
    teamA: [
      // Team A attacks left→right. Facing the pitch from behind their goal:
      // Left = top of screen (low y), Right = bottom of screen (high y)
      { role:'GK', x:5,  y:34 },
      { role:'RB', x:20, y:55 },  // RB = right side = bottom of pitch (high y)
      { role:'CB', x:20, y:42 },
      { role:'CB', x:20, y:26 },
      { role:'LB', x:20, y:13 },  // LB = left side = top of pitch (low y)
      { role:'RM', x:44, y:55 },  // RM = right midfield = bottom
      { role:'CM', x:44, y:42 },
      { role:'CM', x:44, y:26 },
      { role:'LM', x:44, y:13 },  // LM = left midfield = top
      { role:'ST', x:48, y:38 },
      { role:'ST', x:48, y:30 },
    ],
    teamB: [
      // Team B attacks right→left. Mirror of Team A.
      { role:'GK', x:100, y:34 },
      { role:'LB', x:85,  y:55 },  // LB = bottom from their perspective
      { role:'CB', x:85,  y:42 },
      { role:'CB', x:85,  y:26 },
      { role:'RB', x:85,  y:13 },  // RB = top from their perspective
      { role:'LM', x:61,  y:55 },
      { role:'CM', x:61,  y:42 },
      { role:'CM', x:61,  y:26 },
      { role:'RM', x:61,  y:13 },
      { role:'ST', x:57,  y:38 },
      { role:'ST', x:57,  y:30 },
    ],
    ball: { x:52.5, y:34 },
    explanation: 'Default 4-4-2 formation. Both teams lined up symmetrically on their own half. Team A attacks left to right, Team B right to left. Ball at centre spot.'
  };

  // ── INIT ──────────────────────────────────────────────────────────────────
  window.onload = function() {
    if (geminiKey) {
      document.getElementById('gemini-key').value = geminiKey;
      showKeyStatus('Key loaded.', true);
    }
    currentScenario = DEFAULT_SCENARIO;
    renderPitch(DEFAULT_SCENARIO, false);
    renderSaved();
  };

  // ── KEY ───────────────────────────────────────────────────────────────────
  function saveKey() {
    const val = document.getElementById('gemini-key').value.trim();
    if (!val) return;
    geminiKey = val;
    localStorage.setItem('lrai_gemini_key', val);
    showKeyStatus('Key saved.', true);
  }
  function showKeyStatus(msg, ok) {
    const el = document.getElementById('key-status');
    el.textContent = msg;
    el.className = 'key-status' + (ok ? ' ok' : '');
    el.style.display = 'block';
  }

  // ── GENERATE ──────────────────────────────────────────────────────────────
  async function generate() {
    const prompt = document.getElementById('prompt-input').value.trim();
    if (!prompt) return;
    if (!geminiKey) { showErr('Gemini API key required.'); return; }

    setLoading(true);
    clearErr();

    const systemPrompt = `You are a football (soccer) tactics engine. Convert the user's tactical description into a precise JSON object representing player positions on a football pitch.

COORDINATE SYSTEM:
- Pitch is 105 units wide (x axis, left to right) and 68 units tall (y axis, top to bottom)
- Team A (home, blue) always attacks LEFT TO RIGHT (their GK starts near x=5). For Team A: LB is at LOW y (top of screen), RB is at HIGH y (bottom of screen), LM top, RM bottom.
- Team B (away, red) always attacks RIGHT TO LEFT (their GK starts near x=100)
- Centre of pitch: x=52.5, y=34
- Left goal centre: x=0, y=34
- Right goal centre: x=105, y=34
- Penalty spots: x=11 (left), x=94 (right)
- Penalty areas: x=0-16.5 (left), x=88.5-105 (right), y=13.84 to 54.16
- Goal areas: x=0-5.5 (left), x=99.5-105 (right), y=24.84 to 43.16
- Corner flags: (0,0), (105,0), (0,68), (105,68)

ROLE ABBREVIATIONS (use these exactly):
GK, RB, LB, CB, RWB, LWB, CDM, CM, CAM, RM, LM, RW, LW, SS, ST, CF

MOVEMENT ARROWS:
- dx, dy represent movement vector in pitch units (not pixels)
- Use arrows to show: runs, ball trajectory, pressing direction
- Keep arrow lengths realistic (5-25 units for runs, longer for ball trajectory)
- Only add arrows when tactically meaningful

BALL:
- Always include ball position based on the scenario described
- For free kicks: place ball at the described location
- For corners: place at corner flag
- For goal kicks: place in goal area
- For penalties: place at penalty spot
- For open play: place at most tactically relevant position

RESPONSE FORMAT (return ONLY valid JSON, no markdown, no explanation outside JSON):
{
  "teamA": [
    { "role": "GK", "x": 5, "y": 34 },
    { "role": "CB", "x": 20, "y": 38, "dx": 5, "dy": -3 }
  ],
  "teamB": [
    { "role": "GK", "x": 100, "y": 34 }
  ],
  "ball": { "x": 52.5, "y": 34 },
  "explanation": "2-3 sentence tactical explanation of what is happening in this scenario and why players are positioned as shown."
}

RULES:
- Always include exactly 11 players per team unless the prompt explicitly says otherwise
- Positions must be within pitch bounds (x: 0-105, y: 0-68)
- Players should not overlap (minimum 2 units apart)
- Goalkeeper must stay near their own goal
- Make positions tactically accurate and realistic
- Ball x,y must be a specific location, not the centre unless appropriate

USER PROMPT: ${prompt}`;

    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: systemPrompt }] }] })
      });

      if (!res.ok) {
        const err = await res.json().catch(()=>({}));
        throw new Error(err?.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const raw = data.candidates[0].content.parts[0].text;
      const clean = raw.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
      const scenario = JSON.parse(clean);

      // Validate
      if (!scenario.teamA || !scenario.teamB || !scenario.ball) throw new Error('Invalid response structure from AI.');

      currentScenario = scenario;
      renderPitch(scenario, true);
      showExplanation(scenario.explanation || '');
      setLoading(false);

    } catch(e) {
      setLoading(false);
      showErr('Error: ' + e.message);
      console.error('[lockerroom-ai]', e);
    }
  }

  function quickPrompt(text) {
    document.getElementById('prompt-input').value = text;
    generate();
  }

  // ── RENDER PITCH ──────────────────────────────────────────────────────────
  function renderPitch(scenario, animate) {
    const svg = document.getElementById('pitch-svg');

    // Build full SVG
    let s = '';

    // ── Pitch background with floodlit gradient ──
    s += `<defs>
      <radialGradient id="floodlight" cx="50%" cy="50%" r="60%">
        <stop offset="0%" stop-color="#2d7a45"/>
        <stop offset="60%" stop-color="#236638"/>
        <stop offset="100%" stop-color="#142e1f"/>
      </radialGradient>
      <radialGradient id="floodlight2" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.04)"/>
        <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
      </radialGradient>
      <marker id="arrowA" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
        <path d="M0,0 L0,6 L6,3 z" fill="#4da6ff" opacity="0.9"/>
      </marker>
      <marker id="arrowB" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
        <path d="M0,0 L0,6 L6,3 z" fill="#ff5555" opacity="0.9"/>
      </marker>
      <marker id="arrowBall" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
        <path d="M0,0 L0,6 L6,3 z" fill="#ffffff" opacity="0.9"/>
      </marker>
      <filter id="glow">
        <feGaussianBlur stdDeviation="1.5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>`;

    // Pitch surface
    s += `<rect width="105" height="68" fill="url(#floodlight)"/>`;
    s += `<rect width="105" height="68" fill="url(#floodlight2)"/>`;

    // Subtle grass stripes
    for (let i = 0; i < 7; i++) {
      s += `<rect x="${i*15}" y="0" width="15" height="68" fill="${i%2===0?'rgba(0,0,0,0.06)':'rgba(255,255,255,0.02)'}"/>`;
    }

    // ── Pitch markings ──
    const M = 'stroke="rgba(255,255,255,0.85)" stroke-width="0.35" fill="none"';
    const MF = 'stroke="rgba(255,255,255,0.85)" stroke-width="0.35"';

    // Boundary
    s += `<rect x="0.5" y="0.5" width="104" height="67" ${M}/>`;
    // Halfway line
    s += `<line x1="52.5" y1="0.5" x2="52.5" y2="67.5" ${M}/>`;
    // Centre circle
    s += `<circle cx="52.5" cy="34" r="9.15" ${M}/>`;
    // Centre spot
    s += `<circle cx="52.5" cy="34" r="0.4" fill="rgba(255,255,255,0.7)"/>`;

    // Left penalty area
    s += `<rect x="0.5" y="13.84" width="16.5" height="40.32" ${M}/>`;
    // Left goal area
    s += `<rect x="0.5" y="24.84" width="5.5" height="18.32" ${M}/>`;
    // Left goal
    s += `<rect x="-1.5" y="28.88" width="2" height="10.24" stroke="rgba(255,255,255,0.9)" stroke-width="0.5" fill="rgba(255,255,255,0.06)"/>`;
    // Left penalty spot
    s += `<circle cx="11" cy="34" r="0.4" fill="rgba(255,255,255,0.7)"/>`;
    // Left penalty arc
    s += `<path d="M16.5,22 A9.15,9.15 0 0,1 16.5,46" ${M}/>`;

    // Right penalty area
    s += `<rect x="88" y="13.84" width="16.5" height="40.32" ${M}/>`;
    // Right goal area
    s += `<rect x="99" y="24.84" width="5.5" height="18.32" ${M}/>`;
    // Right goal
    s += `<rect x="104.5" y="28.88" width="2" height="10.24" stroke="rgba(255,255,255,0.9)" stroke-width="0.5" fill="rgba(255,255,255,0.06)"/>`;
    // Right penalty spot
    s += `<circle cx="94" cy="34" r="0.4" fill="rgba(255,255,255,0.7)"/>`;
    // Right penalty arc
    s += `<path d="M88.5,22 A9.15,9.15 0 0,0 88.5,46" ${M}/>`;

    // Corner arcs
    s += `<path d="M0.5,3.5 A3,3 0 0,1 3.5,0.5" ${M}/>`;
    s += `<path d="M101.5,0.5 A3,3 0 0,1 104.5,3.5" ${M}/>`;
    s += `<path d="M0.5,64.5 A3,3 0 0,0 3.5,67.5" ${M}/>`;
    s += `<path d="M101.5,67.5 A3,3 0 0,0 104.5,64.5" ${M}/>`;

    // ── Movement arrows ──
    const allPlayers = [...(scenario.teamA||[]).map(p=>({...p,team:'A'})), ...(scenario.teamB||[]).map(p=>({...p,team:'B'}))];
    allPlayers.forEach(p => {
      if (p.dx !== undefined && p.dy !== undefined) {
        const x2 = p.x + p.dx;
        const y2 = p.y + p.dy;
        const color = p.team === 'A' ? 'rgba(77,166,255,0.8)' : 'rgba(255,85,85,0.8)';
        const markerId = p.team === 'A' ? 'arrowA' : 'arrowB';
        s += `<line x1="${p.x}" y1="${p.y}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="0.6" stroke-dasharray="1.5,0.8" marker-end="url(#${markerId})"/>`;
      }
    });

    // ── Ball arrow if present ──
    if (scenario.ball?.dx !== undefined) {
      const bx2 = scenario.ball.x + scenario.ball.dx;
      const by2 = scenario.ball.y + scenario.ball.dy;
      s += `<line x1="${scenario.ball.x}" y1="${scenario.ball.y}" x2="${bx2}" y2="${by2}" stroke="rgba(255,255,255,0.9)" stroke-width="0.5" marker-end="url(#arrowBall)"/>`;
    }

    // ── Players ──
    const renderPlayers = (players, team) => {
      const fill = team === 'A' ? '#4da6ff' : '#ff5555';
      const stroke = team === 'A' ? '#1a7acc' : '#cc2222';
      players.forEach((p, i) => {
        s += `<g class="player-group" data-team="${team}" data-idx="${i}">
          <circle cx="${p.x}" cy="${p.y}" r="2.2" fill="${fill}" stroke="${stroke}" stroke-width="0.4"/>
          <text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="central" font-size="1.6" font-family="Space Mono, monospace" font-weight="700" fill="white" opacity="0.95">${esc(p.role||'')}</text>
        </g>`;
      });
    };

    renderPlayers(scenario.teamA || [], 'A');
    renderPlayers(scenario.teamB || [], 'B');

    // ── Ball ──
    if (scenario.ball) {
      const bx = scenario.ball.x, by = scenario.ball.y;
      s += `<g>
        <circle cx="${bx}" cy="${by}" r="1.5" fill="white" stroke="rgba(0,0,0,0.35)" stroke-width="0.25"/>
      </g>`;
    }

    svg.innerHTML = s;
  }

  // ── EXPLANATION ───────────────────────────────────────────────────────────
  function showExplanation(text) {
    const panel = document.getElementById('explanation-panel');
    document.getElementById('exp-text').textContent = text;
    panel.classList.add('visible');
  }

  // ── RESET ─────────────────────────────────────────────────────────────────
  function resetToDefault() {
    currentScenario = DEFAULT_SCENARIO;
    document.getElementById('prompt-input').value = '';
    document.getElementById('explanation-panel').classList.remove('visible');
    renderPitch(DEFAULT_SCENARIO, true);
  }

  // ── FULLSCREEN ────────────────────────────────────────────────────────────
  function toggleFullscreen() {
    const wrap = document.getElementById('pitch-wrap');
    const closeBtn = document.getElementById('fullscreen-close');
    wrap.classList.add('fullscreen');
    closeBtn.classList.add('visible');
    document.body.style.overflow = 'hidden';
  }
  function exitFullscreen() {
    const wrap = document.getElementById('pitch-wrap');
    const closeBtn = document.getElementById('fullscreen-close');
    wrap.classList.remove('fullscreen');
    closeBtn.classList.remove('visible');
    document.body.style.overflow = '';
  }

  // ── SAVE / LOAD TACTICS ───────────────────────────────────────────────────
  function saveTactic() {
    if (!currentScenario) return;
    document.getElementById('save-name').value = '';
    document.getElementById('save-modal').classList.add('open');
    setTimeout(() => document.getElementById('save-name').focus(), 100);
  }

  function confirmSave() {
    const name = document.getElementById('save-name').value.trim();
    if (!name) return;
    const entry = {
      id: Date.now().toString(36),
      name,
      scenario: currentScenario,
      prompt: document.getElementById('prompt-input').value.trim(),
      saved: Date.now()
    };
    savedTactics.unshift(entry);
    if (savedTactics.length > 20) savedTactics = savedTactics.slice(0,20);
    localStorage.setItem('lrai_saved', JSON.stringify(savedTactics));
    closeModal();
    renderSaved();
    showToast('Tactic saved!');
  }

  function loadSaved(id) {
    const entry = savedTactics.find(t => t.id === id);
    if (!entry) return;
    currentScenario = entry.scenario;
    document.getElementById('prompt-input').value = entry.prompt || '';
    renderPitch(entry.scenario, true);
    showExplanation(entry.scenario.explanation || '');
  }

  function deleteSaved(id, e) {
    e.stopPropagation();
    savedTactics = savedTactics.filter(t => t.id !== id);
    localStorage.setItem('lrai_saved', JSON.stringify(savedTactics));
    renderSaved();
  }

  function renderSaved() {
    const section = document.getElementById('saved-section');
    const list = document.getElementById('saved-list');
    if (!savedTactics.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = savedTactics.map(t => `
      <div class="saved-chip" onclick="loadSaved('${t.id}')">
        ${esc(t.name)}
        <span class="del" onclick="deleteSaved('${t.id}', event)">✕</span>
      </div>
    `).join('');
  }

  function closeModal() { document.getElementById('save-modal').classList.remove('open'); }

  // ── EXPORT ────────────────────────────────────────────────────────────────
  function exportJSON() {
    if (!currentScenario) return;
    const payload = { ...currentScenario, teamA_name: document.getElementById('team-a-name').value, teamB_name: document.getElementById('team-b-name').value, exported: new Date().toISOString() };
    const a = document.createElement('a');
    a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(payload, null, 2));
    a.download = 'lockerroom-tactic.json';
    a.click();
  }

  function copyExplanation(btn) {
    const text = document.getElementById('exp-text').textContent;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Copied!'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy explanation'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function screenshotPitch() {
    const svg = document.getElementById('pitch-svg');
    const svgData = new XMLSerializer().serializeToString(svg);
    const canvas = document.createElement('canvas');
    const bbox = svg.getBoundingClientRect();
    canvas.width = Math.max(bbox.width * 2, 840);
    canvas.height = Math.max(bbox.height * 2, 544);
    const ctx = canvas.getContext('2d');
    const img = new Image();
    const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);
    img.onload = function() {
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      const a = document.createElement('a');
      a.download = 'lockerroom-tactic.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    };
    img.src = url;
  }

  // ── HELPERS ───────────────────────────────────────────────────────────────
  function setLoading(on) {
    document.getElementById('loading-bar').className = 'loading-bar' + (on ? ' active' : '');
    document.getElementById('gen-btn').disabled = on;
    document.getElementById('gen-btn').textContent = on ? 'GENERATING...' : 'GENERATE →';
  }

  function showErr(msg) {
    const el = document.getElementById('err-msg');
    el.textContent = msg; el.style.display = 'block';
  }
  function clearErr() { document.getElementById('err-msg').style.display = 'none'; }

  function showToast(msg) {
    // Simple inline toast using explanation panel temporarily
    const btn = document.querySelector('.exp-btn');
    if (btn) { const orig = btn.textContent; btn.textContent = msg; setTimeout(()=>btn.textContent=orig, 2000); }
  }

  function esc(s) {
    if (typeof s !== 'string') return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  </script>
